<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="12.5">
  <defs>
    <marker id="cm" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b6776"/></marker>
  </defs>
  <style>
    .n{fill:#fff;stroke:#1f2733;stroke-width:1.6;rx:8}
    .core{fill:#fdeee9;stroke:#c8442b;stroke-width:2}
    .cal{fill:#eef4ff;stroke:#1f6feb;stroke-width:1.8}
    .sys{fill:#eafaf1;stroke:#0a8f5b;stroke-width:1.8}
    .t{fill:#1f2733;text-anchor:middle}
    .e{stroke:#5b6776;stroke-width:1.4;fill:none}
    .lab{fill:#8a93a0;font-size:10.5px;text-anchor:middle}
  </style>
  <text x="20" y="26" font-size="15" font-weight="700" fill="#c8442b">Concept dependency map — read along the arrows ("requires")</text>

  <!-- foundation -->
  <rect x="40" y="60" width="150" height="42" class="n core" rx="8"/><text x="115" y="80" class="t">DTC-assisted</text><text x="115" y="95" class="t" font-size="11">architecture (sl.9,39)</text>
  <rect x="40" y="140" width="150" height="40" class="n" rx="8"/><text x="115" y="165" class="t">ΔΣ / MASH QE</text>
  <rect x="40" y="220" width="150" height="40" class="n" rx="8"/><text x="115" y="245" class="t">DTC INL & noise</text>

  <!-- loop -->
  <rect x="250" y="60" width="160" height="42" class="n" rx="8"/><text x="330" y="80" class="t">Linear loop model</text><text x="330" y="95" class="t" font-size="11">NTFs, Bode (sl.5)</text>
  <rect x="250" y="140" width="160" height="42" class="n" rx="8"/><text x="330" y="160" class="t">Loop dynamics</text><text x="330" y="175" class="t" font-size="11">poles, ζ, lock</text>
  <rect x="250" y="220" width="160" height="42" class="n" rx="8"/><text x="330" y="240" class="t">Fractional spurs</text><text x="330" y="255" class="t" font-size="11">INL→tones (sl.41)</text>

  <!-- calibrations -->
  <rect x="470" y="40" width="170" height="40" class="n cal" rx="8"/><text x="555" y="65" class="t">offset cal (zero-mean e)</text>
  <rect x="470" y="100" width="170" height="40" class="n cal" rx="8"/><text x="555" y="120" class="t">K_DTC gain cal</text><text x="555" y="134" class="t" font-size="11">sign-error LMS</text>
  <rect x="470" y="160" width="170" height="40" class="n cal" rx="8"/><text x="555" y="180" class="t">VCO duty cal</text><text x="555" y="194" class="t" font-size="11">sign-sign LMS</text>
  <rect x="470" y="220" width="170" height="40" class="n cal" rx="8"/><text x="555" y="240" class="t">CKREF duty cal</text><text x="555" y="254" class="t" font-size="11">sign-sign LMS</text>
  <rect x="470" y="285" width="170" height="40" class="n" rx="8"/><text x="555" y="305" class="t">range reduction</text><text x="555" y="319" class="t" font-size="11">½ / 1/8 (sl.34,38)</text>

  <!-- outcomes -->
  <rect x="700" y="100" width="170" height="44" class="n" rx="8"/><text x="785" y="120" class="t">Noise budget</text><text x="785" y="135" class="t" font-size="11">87.6 fs (sl.42)</text>
  <rect x="700" y="180" width="170" height="44" class="n sys" rx="8"/><text x="785" y="200" class="t">System impact</text><text x="785" y="215" class="t" font-size="11">EVM, FoM, recip-mix</text>
  <rect x="700" y="285" width="170" height="44" class="n sys" rx="8"/><text x="785" y="305" class="t">Design walkthrough</text><text x="785" y="319" class="t" font-size="11">spec → loop BW</text>

  <!-- edges -->
  <line x1="190" y1="81" x2="250" y2="81" class="e" marker-end="url(#cm)"/>
  <line x1="190" y1="160" x2="250" y2="160" class="e" marker-end="url(#cm)"/>
  <line x1="190" y1="240" x2="250" y2="240" class="e" marker-end="url(#cm)"/>
  <line x1="330" y1="102" x2="330" y2="140" class="e" marker-end="url(#cm)"/>
  <line x1="115" y1="180" x2="250" y2="232" class="e" marker-end="url(#cm)"/><text x="180" y="200" class="lab">QE→spur</text>
  <line x1="115" y1="260" x2="250" y2="240" class="e" marker-end="url(#cm)"/>
  <!-- offset gates the other cals -->
  <line x1="555" y1="80" x2="555" y2="100" class="e" marker-end="url(#cm)"/><text x="610" y="94" class="lab">gates</text>
  <line x1="640" y1="120" x2="700" y2="118" class="e" marker-end="url(#cm)"/>
  <line x1="640" y1="180" x2="700" y2="125" class="e" marker-end="url(#cm)"/>
  <line x1="640" y1="240" x2="700" y2="130" class="e" marker-end="url(#cm)"/>
  <line x1="410" y1="240" x2="470" y2="300" class="e" marker-end="url(#cm)"/>
  <line x1="640" y1="305" x2="700" y2="305" class="e" marker-end="url(#cm)"/>
  <line x1="410" y1="160" x2="470" y2="120" class="e" marker-end="url(#cm)"/>
  <line x1="785" y1="144" x2="785" y2="180" class="e" marker-end="url(#cm)"/>
  <line x1="410" y1="81" x2="470" y2="110" class="e" marker-end="url(#cm)"/>
  <line x1="330" y1="182" x2="785" y2="285" class="e" marker-end="url(#cm)" opacity="0.35"/>

  <text x="20" y="450" class="lab" text-anchor="start">Red = DTC core · Blue = calibrations (offset must converge first) · Green = system/design outcomes</text>
</svg>
