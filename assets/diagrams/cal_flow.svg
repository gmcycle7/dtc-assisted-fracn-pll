<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 420" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13">
  <defs>
    <marker id="ah3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1f2733"/></marker>
  </defs>
  <style>
    .blk{fill:#fff;stroke:#1f2733;stroke-width:2}
    .lms{fill:#eef4ff;stroke:#1f6feb;stroke-width:2}
    .lbl{fill:#1f2733;text-anchor:middle}
    .sig{fill:#5b6776;font-size:11.5px;text-anchor:middle}
    .wire{stroke:#1f2733;stroke-width:1.8;fill:none}
    .red{fill:#c8442b;font-weight:700;text-anchor:middle}
  </style>

  <!-- comparator producing e[k] -->
  <rect x="410" y="40" width="120" height="44" class="blk" rx="8"/><text x="470" y="60" class="lbl">1-bit comparator</text><text x="470" y="76" class="lbl" font-size="11">e[k]=sign(PHE)</text>
  <text x="470" y="108" class="red" font-size="14">e[k] = &#177;1</text>
  <line x1="470" y1="84" x2="470" y2="120" class="wire"/>
  <!-- offset DAC servo -->
  <rect x="560" y="44" width="118" height="40" class="blk" rx="8" style="stroke:#0a8f5b"/><text x="619" y="62" class="lbl" font-size="12">&#916;V-DAC servo</text><text x="619" y="77" class="lbl" font-size="10.5">V_ref_adj (offset)</text>
  <line x1="560" y1="64" x2="534" y2="64" class="wire" marker-end="url(#ah3)"/>
  <text x="619" y="100" class="sig">drives mean(e)&#8594;0</text>

  <!-- e[k] bus -->
  <line x1="150" y1="120" x2="800" y2="120" class="wire"/>
  <text x="150" y="114" class="sig" text-anchor="start">e[k] bus &#8594; three sign-LMS loops</text>

  <!-- LMS 1: ckref_dcc (mu3, even_cycle) -->
  <rect x="120" y="150" width="150" height="60" class="lms" rx="8"/><text x="195" y="175" class="lbl">Sign-LMS &#956;&#8323;</text><text x="195" y="194" class="lbl" font-size="11">&#215; even_cycle (&#177;1)</text>
  <line x1="195" y1="120" x2="195" y2="150" class="wire" marker-end="url(#ah3)"/>
  <line x1="195" y1="210" x2="195" y2="250" class="wire" marker-end="url(#ah3)"/>
  <text x="195" y="232" class="red" font-size="13">ckref_dcc</text>

  <!-- LMS 2: KDTC (mu2, Phi_e) -->
  <rect x="395" y="150" width="150" height="60" class="lms" rx="8"/><text x="470" y="175" class="lbl">Sign-LMS &#956;&#8322;</text><text x="470" y="194" class="lbl" font-size="11">&#215; &#934;&#8337;[n]</text>
  <line x1="470" y1="120" x2="470" y2="150" class="wire" marker-end="url(#ah3)"/>
  <line x1="470" y1="210" x2="470" y2="250" class="wire" marker-end="url(#ah3)"/>
  <text x="470" y="232" class="red" font-size="13">K<tspan baseline-shift="sub" font-size="9">DTC</tspan></text>

  <!-- LMS 3: vco_dcc (mu1, SEL_CKFB) -->
  <rect x="670" y="150" width="150" height="60" class="lms" rx="8"/><text x="745" y="175" class="lbl">Sign-LMS &#956;&#8321;</text><text x="745" y="194" class="lbl" font-size="11">&#215; SEL_CKFB (&#177;1)</text>
  <line x1="745" y1="120" x2="745" y2="150" class="wire" marker-end="url(#ah3)"/>
  <line x1="745" y1="210" x2="745" y2="250" class="wire" marker-end="url(#ah3)"/>
  <text x="745" y="232" class="red" font-size="13">vco_dcc</text>

  <!-- targets row -->
  <rect x="110" y="252" width="170" height="40" fill="#fff" stroke="#5b6776" rx="8"/><text x="195" y="270" class="lbl" font-size="11">FCW' = FCW + ckref_dcc</text><text x="195" y="285" class="sig">&#8594; into modified &#931;&#916;</text>
  <rect x="385" y="252" width="170" height="40" fill="#fff" stroke="#5b6776" rx="8"/><text x="470" y="270" class="lbl" font-size="11">main DTC term</text><text x="470" y="285" class="sig">K<tspan baseline-shift="sub" font-size="9">DTC</tspan>&#183;&#934;&#8337;[n]</text>
  <rect x="660" y="252" width="170" height="40" fill="#fff" stroke="#5b6776" rx="8"/><text x="745" y="270" class="lbl" font-size="11">+ vco_dcc&#183;SEL_CKFB</text><text x="745" y="285" class="sig">push/pull &#177;&#916;t_err/2</text>

  <!-- combine to DTC code -->
  <line x1="470" y1="292" x2="470" y2="330" class="wire"/>
  <line x1="195" y1="292" x2="195" y2="312" class="wire"/><line x1="745" y1="292" x2="745" y2="312" class="wire"/>
  <line x1="195" y1="330" x2="745" y2="330" class="wire"/>
  <rect x="390" y="330" width="160" height="44" class="blk" rx="8" style="stroke:#c8442b"/><text x="470" y="350" class="red" font-size="13">DTC code</text><text x="470" y="366" class="sig">= K<tspan baseline-shift="sub" font-size="9">DTC</tspan>&#183;&#934;&#8337; + vco_dcc + offset</text>

  <text x="20" y="28" font-size="15" font-weight="700" fill="#c8442b">Calibration flow — four background loops share one 1-bit error e[k]=sign(PHE)</text>
  <text x="20" y="45" class="sig" text-anchor="start">Blue = sign-LMS integrators (slide 40) · each correlates e[k] with a different regressor to isolate its error</text>
</svg>
